[tool.ruff]
target-version = "py311"
line-length = 88
extend-exclude = ["__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = true
explicit_package_bases = true
namespace_packages = true

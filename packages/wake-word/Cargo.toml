[package]
name = "guidee-wake-word"
version = "0.1.0"
edition = "2021"
description = "Porcupine wake word bindings for Guidee"

[dependencies]
libloading = { version = "0.8", optional = true }
serde = { version = "1", features = ["derive"] }

[features]
default = []
porcupine = ["dep:libloading"]

[lib]
name = "guidee_wake_word"
path = "src/lib.rs"

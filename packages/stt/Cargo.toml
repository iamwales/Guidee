[package]
name = "guidee-stt"
version = "0.1.0"
edition = "2021"
description = "Whisper.cpp bindings for Guidee"

[dependencies]
serde = { version = "1", features = ["derive"] }
whisper-rs = { version = "0.16", optional = true }

[features]
default = []
whisper = ["dep:whisper-rs"]

[lib]
name = "guidee_stt"
path = "src/lib.rs"
